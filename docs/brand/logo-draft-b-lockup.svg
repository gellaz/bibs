<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="bibs logo lockup, open hand mark above wordmark">
	<title>bibs logo lockup, draft B</title>
	<desc>Open palm offering mark above lowercase wordmark. Navy ink on transparent. Saffron offering dot in palm. Draft, not final.</desc>
	<defs>
		<style>
			.ink { stroke: #2f3f76; }
			.ink-fill { fill: #2f3f76; }
			.saffron-fill { fill: #e6b057; }
			.wordmark { fill: #2f3f76; font-family: "Bricolage Grotesque", "Cabinet Grotesk", ui-sans-serif, system-ui, sans-serif; font-weight: 600; font-size: 44px; letter-spacing: -0.02em; }
		</style>
	</defs>

