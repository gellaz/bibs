			Q 26 24 28 30
			Q 28 18 36 18
			Q 44 18 44 30
			Q 44 12 52 12
			Q 60 12 60 30
			Q 60 16 68 16
			Q 76 16 76 30
			Q 76 22 82 22
			Q 88 22 88 30
			L 88 38
			Q 88 50 70 54
			Q 50 56 30 54
			Q 14 50 14 36
			Z" />
		<circle class="saffron-fill" cx="51" cy="40" r="3.6" stroke="none" />
	</g>

	<text class="wordmark" x="100" y="130" text-anchor="middle">bibs</text>
</svg>
