services:
  bibs-postgis:
    build:
      context: ./docker/postgis
    container_name: bibs-postgis
    environment:
      - POSTGRES_DB=bibs-db
      - POSTGRES_USER=pgadmin
      - POSTGRES_PASSWORD=P4ssword!
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ images (postgres:18-trixie) place data under
      # /var/lib/postgresql/<major>/<cluster> and reject the legacy
      # /var/lib/postgresql/data mount. Mount one level up so the image
      # owns the layout. After upgrading from <18, run `bun infra:reset`
      # to recreate the volume.
      - bibs-postgis-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d bibs-db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  bibs-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: bibs-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=P4ssword!
      - MINIO_DOMAIN=localhost
    command:
      - server
      - --console-address=:9001
      - /data
    volumes:
      - bibs-minio-data:/data
    # Note: no healthcheck — the minio/minio image ships without curl/wget/nc/mc,
    # so there's no simple in-container probe. `docker compose up --wait` treats
    # this service as ready when it reaches the "running" state, which is good
    # enough for local dev (the API retries S3 on startup).

volumes:
  bibs-postgis-data:
  bibs-minio-data:
