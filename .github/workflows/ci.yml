name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # pretypecheck hooks compile Paraglide messages before tsc in each frontend.
      # TODO: add `bunx @inlang/cli validate` if message-quality gates become useful.
      - run: bun run typecheck

  api-test:
    name: API tests (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Integration tests spin up Postgres/PostGIS via testcontainers; Docker is preinstalled on ubuntu-latest.
      # Env vars required by @/lib/env are injected in apps/api/tests/preload.ts, no secrets needed here.
      - run: bun run test
